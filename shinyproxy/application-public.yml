server:
  servlet:
    context-path: /public
  forward-headers-strategy: native
  port: 8082

management:
  server:
    port: 9092

proxy:
  title: "Bioinformatics Core Shiny Apps"
  port: 8082
  landing-page: /
  template-path: /etc/shinyproxy/templates
  authentication: none
  docker:
    internal-networking: false
    url: http://localhost:2375
  specs:
    - id: deapp
      display-name: "DEApp"
      description: "Differential expression analysis using edgeR, DESeq2, and limma."
      logo-url: "/images/deanalysis.jpg"
      container-image: ghcr.io/zhongyuli2026/shiny-deapp:latest
      port: 3838
    - id: hello_shiny
      display-name: "Hello Shiny"
      description: "Classic Shiny demo app — a histogram of the Old Faithful geyser waiting times with an adjustable bin slider."
      container-image: ghcr.io/zhongyuli2026/shiny-hello-shiny:latest
      port: 3838
